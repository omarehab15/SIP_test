# docker-compose.gpu.yml — GPU overlay for docker-compose.yml
# Use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up --build

services:

  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  whisper:
    environment:
      - VOXBOX_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
