# docker-compose.remote.yml — Run on the vast.ai GPU machine
# Serves STT (Whisper) only

services:

  whisper:
    build:
      context: ./inference/whisper

    volumes:
      - whisper-cache:/data

    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-dev-ahmedhany/whisper-large-v3-arabic-ft-v3-ct2-int8}

    ports:
      - "11435:80"

    restart: unless-stopped

volumes:
  whisper-cache: