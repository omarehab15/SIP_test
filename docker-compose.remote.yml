# docker-compose.remote.yml — Run on the vast.ai GPU machine
# Serves STT (Whisper) only — LLM + TTS are now handled by Groq cloud
# Whisper endpoint is exposed on 0.0.0.0 for Tailscale access

services:

  # ─── STT — Whisper (via VoxBox) ──────────────────────────────────────────────
  whisper:
    build:
      context: ./inference/whisper
    volumes:
      - whisper-cache:/data
    environment:
      - VOXBOX_HF_REPO_ID=${VOXBOX_HF_REPO_ID:-dev-ahmedhany/whisper-large-v3-arabic-ft-v3-ct2-int8}
    ports:
      - "11435:80"
    restart: unless-stopped

volumes:
  whisper-cache:
