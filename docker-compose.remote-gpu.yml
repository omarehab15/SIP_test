# docker-compose.remote-gpu.yml — GPU overlay for docker-compose.remote.yml
# Use with: docker compose -f docker-compose.remote.yml -f docker-compose.remote-gpu.yml up
# Compatible with: RTX 5090, RTX 4090, A100, H100 (PCIe/SXM/NVL), GH200

services:

  whisper:
    environment:
      - VOXBOX_DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
